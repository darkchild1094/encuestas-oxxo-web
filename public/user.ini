# Configuración de PHP específica para alwaysdata
# Este archivo se coloca en public/ y controla el comportamiento de PHP

# Error reporting - Mostrar todos los errores en desarrollo
error_reporting = E_ALL
display_errors = Off
display_startup_errors = Off
log_errors = On

# Sesiones - Usar archivos (por defecto en alwaysdata puede fallar)
session.save_handler = files
session.gc_divisor = 100
session.gc_probability = 1
session.gc_maxlifetime = 1440

# Si alwaysdata no permite cambiar session.save_path aquí, hazlo en index.php
# session.save_path = "/path/to/sessions"

# POST/Upload
post_max_size = 20M
upload_max_filesize = 10M

# Timeout
max_execution_time = 300

# Character encoding
default_charset = utf-8

# MySQL/PDO
pdo.mysql.default_socket = /var/run/mysqld/mysqld.sock
